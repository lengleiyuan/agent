<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审批管理 — HarnessAgent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1; --surface: #111827; --surface-2: #131b26;
            --border: #1e293b; --text: #e2e8f0; --text-muted: #94a3b8;
            --radius: 12px; --radius-sm: 8px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Inter, -apple-system, sans-serif; background:#0b0f19; color:var(--text); padding:24px; }
        h2 { font-size:1.3rem; font-weight:600; margin-bottom:20px; }
        .tabs { display:flex; gap:2px; margin-bottom:20px; }
        .tabs button { padding:8px 20px; border:none; background:var(--surface); color:var(--text-muted); cursor:pointer; border-radius:6px 6px 0 0; font-size:0.9rem; }
        .tabs button.active { background:var(--accent); color:#fff; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; margin-bottom:12px; }
        .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
        .risk { font-size:0.7rem; padding:2px 8px; border-radius:4px; font-weight:600; }
        .risk-LOW { background:rgba(34,197,94,0.15); color:#22c55e; }
        .risk-MEDIUM { background:rgba(245,158,11,0.15); color:#f59e0b; }
        .risk-HIGH { background:rgba(239,68,68,0.15); color:#ef4444; }
        .risk-CRITICAL { background:rgba(239,68,68,0.3); color:#fca5a5; }
        .args-table { font-size:0.8rem; margin:8px 0; }
        .args-table td { padding:2px 10px 2px 0; color:var(--text-muted); }
        .args-table td:last-child { color:var(--text); font-family:monospace; }
        .context-msgs { background:var(--surface-2); border-radius:6px; padding:10px 14px; margin:8px 0; font-size:0.78rem; max-height:200px; overflow-y:auto; }
        .context-msgs .c-user { color:#818cf8; }
        .context-msgs .c-asst { color:#34d399; }
        .context-msgs .c-tool { color:#fbbf24; }
        .actions { display:flex; gap:8px; margin-top:12px; }
        .actions button { padding:8px 20px; border:none; border-radius:6px; cursor:pointer; font-size:0.85rem; font-weight:600; }
        .btn-approve { background:#22c55e; color:#000; }
        .btn-deny { background:#ef4444; color:#fff; }
        .btn-detail { background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
        .comment-input { flex:1; padding:8px 12px; background:var(--surface-2); color:var(--text); border:1px solid var(--border); border-radius:6px; font-size:0.85rem; }
        .status-badge { font-size:0.75rem; padding:2px 8px; border-radius:4px; }
        .status-APPROVED { background:rgba(34,197,94,0.15); color:#22c55e; }
        .status-DENIED { background:rgba(239,68,68,0.15); color:#ef4444; }
        .status-EXPIRED { background:rgba(148,163,184,0.15); color:var(--text-muted); }
        .status-PENDING { background:rgba(245,158,11,0.15); color:#f59e0b; }
        .empty { text-align:center; padding:60px; color:var(--text-muted); }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
    </style>
</head>
<body>
<h2><i class="bi bi-shield-check"></i> 审批管理</h2>

<div class="tabs">
    <button id="tab-pending" class="active" onclick="showTab('pending')">待审批</button>
    <button id="tab-resolved" onclick="showTab('resolved')">已处理</button>
</div>

<div id="list"></div>

<script>
let allInterventions = [];
let currentTab = 'pending';

async function load() {
    try {
        const r = await fetch('/api/interventions/all');
        allInterventions = await r.json();
    } catch(e) { allInterventions = []; }
    render();
}

function showTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    render();
}

function render() {
    const filtered = currentTab === 'pending'
        ? allInterventions.filter(a => a.status === 'PENDING')
        : allInterventions.filter(a => a.status !== 'PENDING');

    if (filtered.length === 0) {
        document.getElementById('list').innerHTML =
            '<div class="empty"><i class="bi bi-inbox" style="font-size:2rem;opacity:0.3;display:block;margin-bottom:8px"></i>' +
            (currentTab === 'pending' ? '无待审批项' : '无已处理项') + '</div>';
        return;
    }

    document.getElementById('list').innerHTML = filtered.map(a => {
        const args = a.toolArgs ? Object.entries(a.toolArgs).map(([k,v]) =>
            `<tr><td>${esc(k)}</td><td>${esc(String(v))}</td></tr>`).join('') : '';
        const msgs = a.recentMessages ? a.recentMessages.map(m => {
            const role = (m.role||'').toLowerCase();
            const cls = role === 'user' ? 'c-user' : role === 'assistant' ? 'c-asst' : 'c-tool';
            const text = (m.contentBlocks||[]).filter(b=>b.type==='text').map(b=>b.text).join('')
                || m.textContent || '';
            return `<div class="${cls}"><b>${role}</b>: ${esc(text)}</div>`;
        }).join('') : '';
        const isPending = a.status === 'PENDING';
        const time = a.createdAt ? new Date(a.createdAt).toLocaleString() : '—';
        const expiresIn = a.expiresAt ? Math.max(0, Math.ceil((a.expiresAt - Date.now())/60000)) : 0;

        return `<div class="card">
            <div class="card-header">
                <div>
                    <span class="risk risk-${a.riskLevel || 'MEDIUM'}">${a.riskLevel || 'MEDIUM'}</span>
                    <strong style="margin-left:8px">${esc(a.toolName)}</strong>
                </div>
                <div style="font-size:0.75rem;color:var(--text-muted);text-align:right">
                    <div>${time}</div>
                    ${isPending ? `<div style="color:#f59e0b">${expiresIn}分钟后过期</div>` : ''}
                </div>
            </div>
            <div><b>会话:</b> <code style="font-size:0.75rem">${esc(a.sessionId||'')}</code></div>
            ${args ? `<table class="args-table">${args}</table>` : ''}
            <div style="margin-top:6px"><b>问题:</b> ${esc(a.question||'')}</div>
            ${msgs ? `<details style="margin-top:6px"><summary style="cursor:pointer;font-size:0.8rem;color:var(--accent)">对话上下文</summary><div class="context-msgs">${msgs}</div></details>` : ''}
            ${!isPending ? `
                <div style="margin-top:8px;font-size:0.8rem">
                    <span class="status-badge status-${a.status}">${a.status}</span>
                    <span style="margin-left:8px;color:var(--text-muted)">审批人: ${esc(a.approverId||'—')} ${a.approverComment ? '| 备注: '+esc(a.approverComment) : ''}</span>
                    ${a.resolvedAt ? `<span style="margin-left:8px;color:var(--text-muted)">${new Date(a.resolvedAt).toLocaleString()}</span>` : ''}
                </div>
            ` : `
                <div class="actions">
                    <input class="comment-input" placeholder="审批备注（可选）" id="comment-${a.interventionId}">
                    <button class="btn-approve" onclick="resolve('${a.interventionId}','approve')">批准</button>
                    <button class="btn-deny" onclick="resolve('${a.interventionId}','deny')">拒绝</button>
                </div>
            `}
        </div>`;
    }).join('');
}

async function resolve(id, action) {
    const comment = document.getElementById('comment-' + id)?.value || '';
    try {
        await fetch('/api/interventions/' + id + '/resolve', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ action, comment })
        });
        load();
    } catch(e) { alert('操作失败: ' + e.message); }
}

function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

load();
setInterval(load, 10000); // 10秒轮询
</script>
</body>
</html>
