<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarnessAgent — 智能体控制台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --sidebar-w: 260px;
            --accent: #6366f1;
            --accent-glow: rgba(99,102,241,0.25);
            --surface: #111827;
            --surface-2: #131b26;
            --border: #1e293b;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0f19; color: var(--text); overflow: hidden; height: 100vh;
        }
        .app-shell { display: flex; height: 100vh; }
        .sidebar {
            width: var(--sidebar-w); background: var(--surface);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-brand {
            padding: 20px 20px 16px; font-size: 1.2rem; font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .sidebar-nav { flex: 1; padding: 8px 12px; display: flex; flex-direction: column; gap: 2px; }
        .sidebar-nav button {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            border-radius: var(--radius-sm); color: var(--text-muted); font-size: 0.9rem;
            cursor: pointer; transition: all 0.2s; border: none; background: none; width: 100%; text-align: left;
        }
        .sidebar-nav button:hover { background: var(--surface-2); color: var(--text); }
        .sidebar-nav button.active { background: var(--accent); color: #fff; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        .main-header {
            padding: 14px 24px; border-bottom: 1px solid var(--border);
            background: var(--surface); display: flex; align-items: center; gap: 12px; flex-shrink: 0;
        }
        .main-body { flex: 1; overflow-y: auto; padding: 24px; }

        /* Chat */
        .chat-area { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 8px 24px; display: flex; flex-direction: column; gap: 14px; }
        .chat-bubble {
            max-width: 80%; padding: 12px 16px; border-radius: var(--radius);
            line-height: 1.6; font-size: 0.92rem; animation: bubbleIn 0.25s ease-out;
        }
        .chat-bubble.user {
            align-self: flex-end; background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff; border-bottom-right-radius: 4px;
        }
        .chat-bubble.assistant {
            align-self: flex-start; background: var(--surface-2);
            border: 1px solid var(--border); border-bottom-left-radius: 4px;
            word-break: break-word;
        }
        .chat-bubble .role-tag {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 6px; opacity: 0.6;
        }
        /* Markdown 内容排版 */
        .chat-bubble.assistant p { margin: 0 0 0.5em 0; }
        .chat-bubble.assistant p:last-child { margin-bottom: 0; }
        .chat-bubble.assistant ul, .chat-bubble.assistant ol { margin: 0.3em 0; padding-left: 1.5em; }
        .chat-bubble.assistant li { margin: 0.15em 0; }
        .chat-bubble.assistant h1, .chat-bubble.assistant h2, .chat-bubble.assistant h3, .chat-bubble.assistant h4 { margin: 0.6em 0 0.3em 0; font-size: 1em; font-weight: 600; }
        .chat-bubble.assistant pre { margin: 0.4em 0; padding: 10px 14px; background: #0b0f19; border-radius: 6px; overflow-x: auto; font-size: 0.85em; }
        .chat-bubble.assistant code { font-size: 0.9em; background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 3px; }
        .chat-bubble.assistant pre code { background: none; padding: 0; }
        .chat-bubble.assistant blockquote { margin: 0.4em 0; padding: 4px 12px; border-left: 3px solid var(--accent); color: var(--text-muted); }
        .chat-bubble.assistant table { margin: 0.4em 0; border-collapse: collapse; font-size: 0.85em; }
        .chat-bubble.assistant th, .chat-bubble.assistant td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
        .chat-bubble.assistant hr { margin: 0.6em 0; border: none; border-top: 1px solid var(--border); }
        .chat-input-row {
            display: flex; gap: 10px; padding: 16px 24px;
            border-top: 1px solid var(--border); flex-shrink: 0;
        }
        .chat-input-row textarea {
            flex: 1; resize: none; padding: 12px 14px;
            border-radius: var(--radius); border: 1px solid var(--border);
            background: var(--surface); color: var(--text);
            font-size: 0.92rem; font-family: inherit;
            transition: border-color 0.2s; line-height: 1.4;
        }
        .chat-input-row textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 12px; opacity: 0.3; }

        /* Thinking / Tool steps */
        .steps-container { margin-bottom: 8px; display: flex; flex-direction: column; gap: 4px; }
        .step-thinking {
            cursor: pointer; padding: 4px 8px; border-radius: 6px;
            background: rgba(245,158,11,0.1); color: #fbbf24;
            display: inline-flex; align-items: center; user-select: none; font-size: 0.82rem;
        }
        .step-thinking-content {
            padding: 6px 10px; margin-top: 2px; border-radius: 6px;
            background: rgba(245,158,11,0.06); border-left: 2px solid #f59e0b;
            color: #d4a574; font-size: 0.8rem; white-space: pre-wrap;
        }
        .step-tool {
            padding: 4px 8px; border-radius: 6px; background: rgba(99,102,241,0.1);
            display: inline-flex; align-items: center; font-size: 0.82rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        @keyframes bubbleIn {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-brand">⬡ HarnessAgent</div>
        <nav class="sidebar-nav">
            <button onclick="switchView('chat')" id="nav-chat"><i class="bi bi-chat-dots"></i> 对话</button>
            <button onclick="switchView('tools')" id="nav-tools"><i class="bi bi-tools"></i> 工具</button>
            <button onclick="switchView('hooks')" id="nav-hooks"><i class="bi bi-link-45deg"></i> Hook 链</button>
            <button onclick="switchView('settings')" id="nav-settings"><i class="bi bi-gear"></i> 设置</button>
        </nav>
        <!-- Context usage bar — 显示剩余 -->
        <div style="padding:8px 16px;border-top:1px solid var(--border)">
            <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:4px">剩余上下文</div>
            <div style="background:var(--surface-2);border-radius:4px;height:6px;overflow:hidden">
                <div id="ctxBar" style="background:var(--accent);height:100%;width:100%;transition:width 0.5s;border-radius:4px"></div>
            </div>
            <div id="ctxLabel" style="font-size:0.65rem;color:var(--text-muted);margin-top:2px">--  tokens</div>
        </div>
        <div style="padding:6px 16px;border-top:1px solid var(--border);font-size:0.7rem;color:var(--text-muted)">
            会话: <code id="sessIdBadge" style="font-size:0.65rem;color:var(--accent)">—</code>
        </div>
    </aside>
    <main class="main">
        <!-- Chat View -->
        <div id="view-chat" style="display:flex;flex-direction:column;height:100%">
            <div class="main-header">
                <h2 style="font-size:1.05rem;font-weight:600;margin:0"><i class="bi bi-chat-dots me-2"></i>对话</h2>
                <div class="ms-auto d-flex align-items-center gap-2">
                    <a class="btn btn-outline-secondary btn-sm" href="/approvals.html" target="_blank" title="审批管理"><i class="bi bi-shield-check"></i> 审批</a>
                    <button class="btn btn-sm" id="streamToggle" style="background:var(--accent);color:#fff;border:none" onclick="toggleStreamMode()">流式</button>
                    <button class="btn btn-outline-secondary btn-sm" onclick="clearChat()"><i class="bi bi-arrow-counterclockwise"></i></button>
                </div>
            </div>
            <div id="chatMessages" class="chat-messages">
                <div class="empty-state"><i class="bi bi-robot"></i><p>开始一段新的对话</p></div>
            </div>
            <div class="chat-input-row">
                <textarea id="chatInput" rows="1" placeholder="输入消息，⌘+Enter / Ctrl+Enter 发送..." onkeydown="handleChatKey(event)"></textarea>
                <button class="btn px-4" style="background:var(--accent);color:#fff;border:none;" onclick="sendMessage()" id="sendBtn">
                    <i class="bi bi-send-fill"></i>
                </button>
                <button class="btn px-3" style="background:#ef4444;color:#fff;border:none;display:none;border-radius:6px" onclick="interruptStream()" id="stopBtn" title="中断输出 (Esc)">
                    <i class="bi bi-stop-fill"></i>
                </button>
            </div>
        </div>
        <!-- Tools View -->
        <div id="view-tools" style="display:none;flex-direction:column;height:100%">
            <div class="main-header"><h2 style="font-size:1.05rem;font-weight:600;margin:0"><i class="bi bi-tools me-2"></i>已注册工具</h2></div>
            <div class="main-body" id="toolsContent"><div class="empty-state"><i class="bi bi-puzzle"></i><p>加载中...</p></div></div>
        </div>
        <!-- Hooks View -->
        <div id="view-hooks" style="display:none;flex-direction:column;height:100%">
            <div class="main-header"><h2 style="font-size:1.05rem;font-weight:600;margin:0"><i class="bi bi-link-45deg me-2"></i>Hook 链</h2></div>
            <div class="main-body" id="hooksContent"><div class="empty-state"><i class="bi bi-link-45deg"></i><p>加载中...</p></div></div>
        </div>
        <!-- Settings View -->
        <div id="view-settings" style="display:none;flex-direction:column;height:100%">
            <div class="main-header"><h2 style="font-size:1.05rem;font-weight:600;margin:0"><i class="bi bi-gear me-2"></i>设置</h2></div>
            <div class="main-body" id="settingsContent">
                <div class="empty-state"><i class="bi bi-gear"></i><p>加载中...</p></div>
            </div>
        </div>
    </main>
</div>

<script>
// ===================== App State =====================
let isLoading = false;
let streamMode = true;
let sessionId = sessionStorage.getItem('chatSessionId') || newSessionId();
let abortController = null;  // 用于中断流式请求
let lastTokenUsage = 0;      // 最后一次模型调用的 token 消耗

function newSessionId() {
    const id = crypto.randomUUID();
    sessionStorage.setItem('chatSessionId', id);
    return id;
}

function useSessionId(id) {
    sessionId = id;
    sessionStorage.setItem('chatSessionId', id);
}

function toggleStreamMode() {
    streamMode = !streamMode;
    const btn = document.getElementById('streamToggle');
    btn.textContent = streamMode ? '流式' : '非流式';
    btn.style.background = streamMode ? 'var(--accent)' : 'var(--surface-2)';
    btn.style.color = streamMode ? '#fff' : 'var(--text-muted)';
    btn.style.border = streamMode ? 'none' : '1px solid var(--border)';
}

// ===================== View Switching =====================
function switchView(view) {
    document.querySelectorAll('[id^="view-"]').forEach(el => el.style.display = 'none');
    document.querySelectorAll('[id^="nav-"]').forEach(el => el.classList.remove('active'));
    const viewEl = document.getElementById('view-' + view);
    if (viewEl) viewEl.style.display = 'flex';
    const navEl = document.getElementById('nav-' + view);
    if (navEl) navEl.classList.add('active');
    if (view === 'tools') loadTools();
    if (view === 'hooks') loadHooks();
    if (view === 'settings') loadSettings();
}
switchView('chat');

// ===================== Chat =====================
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
let emptyState = chatMessages.querySelector('.empty-state');

function scrollChat() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function clearChat() {
    chatMessages.innerHTML = '';
    emptyState = document.createElement('div');
    emptyState.className = 'empty-state';
    emptyState.innerHTML = '<i class="bi bi-robot"></i><p>开始一段新的对话</p>';
    chatMessages.appendChild(emptyState);
    sessionId = newSessionId();
}

function handleChatKey(e) {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); sendMessage(); }
}

// ESC 中断流式输出
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && isLoading && streamMode) {
        e.preventDefault();
        interruptStream();
    }
});

async function interruptStream() {
    if (abortController) {
        abortController.abort();
        abortController = null;
    }
    // 通知后端中断
    try {
        await fetch('/api/agent/interrupt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Session-Id': sessionId }
        });
    } catch (_) { /* 忽略网络错误 */ }
    isLoading = false;
    sendBtn.disabled = false;
    sendBtn.style.display = '';
    document.getElementById('stopBtn').style.display = 'none';
    chatInput.disabled = false;
    chatInput.focus();
    updateContextUsage();
    pollApprovals();
}

function addUserBubble(text) {
    if (emptyState) { emptyState.remove(); emptyState = null; }
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble user';
    bubble.innerHTML = '<div class="role-tag">user</div><div></div>';
    bubble.lastChild.textContent = text;
    chatMessages.appendChild(bubble);
    scrollChat();
}

function addAssistantBubble(text, thinking, tools) {
    if (emptyState) { emptyState.remove(); emptyState = null; }
    const bubble = document.createElement('div');
    const bubbleId = 'b' + Date.now() + Math.random().toString(36).slice(2, 6);
    bubble.className = 'chat-bubble assistant';
    bubble.innerHTML = '<div class="role-tag">assistant <span id="tokenBadge-' + bubbleId + '" style="font-size:0.65rem;background:rgba(99,102,241,0.12);color:var(--accent);padding:1px 6px;border-radius:3px;margin-left:6px"></span></div>';
    if (thinking || (tools && tools.length > 0)) {
        const stepsEl = document.createElement('div');
        stepsEl.className = 'steps-container';
        if (thinking) {
            stepsEl.innerHTML = `<div class="step-thinking" onclick="var n=this.nextElementSibling;n.style.display=n.style.display==='none'?'block':'none'"><i class="bi bi-lightbulb" style="color:#f59e0b"></i><span style="margin-left:4px">思考过程</span></div><div class="step-thinking-content" style="display:none">${escapeHtml(thinking)}</div>`;
        }
        for (const tc of (tools || [])) {
            stepsEl.innerHTML += `<div class="step-tool"><i class="bi bi-cpu" style="color:#6366f1"></i><span class="badge bg-secondary" style="margin:0 4px">${escapeHtml(tc.name)}</span><span style="color:var(--text-muted);font-size:0.75rem">${escapeHtml(tc.args)}</span></div>`;
        }
        bubble.appendChild(stepsEl);
    }
    const contentEl = document.createElement('div');
    renderMarkdown(contentEl, text);
    bubble.appendChild(contentEl);
    chatMessages.appendChild(bubble);
    scrollChat();
    return bubbleId;
}

function createStreamingBubble() {
    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex'; wrapper.style.flexDirection = 'column'; wrapper.style.alignItems = 'flex-start';
    const bubble = document.createElement('div');
    const bubbleId = 'b' + Date.now();
    bubble.className = 'chat-bubble assistant';
    bubble.innerHTML = '<div class="role-tag">assistant <span id="tokenBadge-' + bubbleId + '" style="font-size:0.65rem;background:rgba(99,102,241,0.12);color:var(--accent);padding:1px 6px;border-radius:3px;margin-left:6px"></span></div>';
    const stepsEl = document.createElement('div');
    stepsEl.className = 'steps-container';
    bubble.appendChild(stepsEl);
    const contentEl = document.createElement('div');
    contentEl.style.whiteSpace = 'pre-wrap';
    contentEl.style.wordBreak = 'break-word';
    bubble.appendChild(contentEl);
    wrapper.appendChild(bubble);
    chatMessages.appendChild(wrapper);
    scrollChat();
    return { wrapper, bubble, stepsEl, contentEl, bubbleId };
}

async function sendMessage() {
    const msg = chatInput.value.trim();
    if (!msg || isLoading) return;
    chatInput.value = '';
    isLoading = true;
    sendBtn.disabled = true;
    sendBtn.style.display = 'none';
    document.getElementById('stopBtn').style.display = '';
    chatInput.disabled = true;

    addUserBubble(msg);

    try {
        if (!streamMode) {
            // 非流式
            const resp = await fetch('/api/agent/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Session-Id': sessionId },
                body: JSON.stringify({ message: msg })
            });
            if (!resp.ok) throw new Error(`${resp.status}`);
            const data = await resp.json();
            const text = data.message?.contentBlocks?.filter(b => b.type === 'text').map(b => b.text).join('')
                || data.message?.textContent || '';
            const tools = (data.message?.toolUseBlocks || []).map(tb => ({ name: tb.name, args: tb.arguments || '' }));
            const thinking = data.message?.thinkingBlocks?.map(b => b.text).join('') || '';
            if (emptyState) { emptyState.remove(); emptyState = null; }
            addAssistantBubble(text, thinking, tools);
            scrollChat();
            updateContextUsage();
            pollApprovals();
        } else {
            // 流式
            abortController = new AbortController();
            const resp = await fetch('/api/agent/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Session-Id': sessionId },
                body: JSON.stringify({ message: msg }),
                signal: abortController.signal
            });
        if (!resp.ok) throw new Error(`${resp.status}`);

        const stream = createStreamingBubble();
        const contentEl = stream.contentEl;
        const stepsEl = stream.stepsEl;
        let accumulatedText = '';
        let thinkingText = '';  // 合并所有思考内容
        let toolCalls = [];     // 实际工具调用（非思考中的）

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        function renderSteps() {
            let html = '';
            // 思考过程 — 合并为一个可折叠块
            if (thinkingText) {
                html += `<div class="step-thinking" onclick="var n=this.nextElementSibling;n.style.display=n.style.display==='none'?'block':'none'"><i class="bi bi-lightbulb" style="color:#f59e0b"></i><span style="margin-left:4px">思考过程</span></div>`;
                html += `<div class="step-thinking-content" style="display:none">${escapeHtml(thinkingText)}</div>`;
            }
            // 工具调用
            for (const tc of toolCalls) {
                html += `<div class="step-tool"><i class="bi bi-cpu" style="color:#6366f1"></i><span class="badge bg-secondary" style="margin:0 4px">${escapeHtml(tc.name)}</span><span style="color:var(--text-muted);font-size:0.75rem">${escapeHtml(tc.args)}</span></div>`;
            }
            stepsEl.innerHTML = html;
        }

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            let idx;
            while ((idx = buffer.indexOf('\n\n')) >= 0) {
                const rawEvent = buffer.slice(0, idx);
                buffer = buffer.slice(idx + 2);
                let sseEvent = '', data = '';
                for (const ln of rawEvent.split('\n')) {
                    if (ln.startsWith('event:')) sseEvent = ln.slice(6).trim();
                    else if (ln.startsWith('data:')) data += ln.slice(5).trim();
                }
                if (!data) continue;
                try {
                    const chunk = JSON.parse(data);
                    const eventType = sseEvent || chunk.type || 'text';
                    const delta = chunk.delta || '';
                    if (delta && eventType !== 'tool_use_start' && eventType !== 'tool_use_delta' && eventType !== 'thinking' && eventType !== 'session' && eventType !== 'usage' && eventType !== 'intervention') {
                        accumulatedText += delta;
                        contentEl.textContent = accumulatedText;
                    }
                    if (eventType === 'thinking') {
                        thinkingText += delta;
                    } else if (eventType === 'session') {
                        useSessionId(delta);
                    } else if (eventType === 'usage') {
                        try {
                            const u = JSON.parse(delta);
                            document.getElementById('tokenBadge-' + stream.bubbleId).textContent =
                                '↑' + u.promptTokens + ' ↓' + u.completionTokens + ' tokens';
                        } catch(e) {}
                    } else if (eventType === 'tool_use_start') {
                        toolCalls.push({ name: chunk.toolName || '', args: '' });
                    } else if (eventType === 'tool_use_delta') {
                        const last = toolCalls[toolCalls.length - 1];
                        if (last) last.args += delta;
                    }
                    renderSteps();
                    scrollChat();
                } catch(e) {}
            }
        }
        // 流结束 → 切换为 markdown 渲染（完整语法可正确解析）
        renderMarkdown(contentEl, accumulatedText);
        scrollChat();
        updateContextUsage();
        pollApprovals();
        } // end stream mode
    } catch (e) {
        if (e.name === 'AbortError') {
            // 用户主动中断 — 不显示错误，已接收的文本保留在气泡中
            updateContextUsage();
        } else {
            const errBubble = document.createElement('div');
            errBubble.className = 'chat-bubble assistant';
            errBubble.innerHTML = '<div class="role-tag">assistant</div><div style="color:#ef4444">错误: ' + escapeHtml(e.message) + '</div>';
            chatMessages.appendChild(errBubble);
        }
    } finally {
        isLoading = false;
        sendBtn.disabled = false;
        sendBtn.style.display = '';
        document.getElementById('stopBtn').style.display = 'none';
        abortController = null;
        chatInput.disabled = false;
        chatInput.focus();
    }
}

function autoWrapMath(text) {
    if (!text) return text;
    // \\(...\\) → $...$
    text = text.replace(/\\\(([\s\S]*?)\\\)/g, '$$$1$$');
    // \\[...\\] → $$...$$
    text = text.replace(/\\\[([\s\S]*?)\\\]/g, '$$$$$1$$$$');
    // 含 LaTeX 命令的整行，无 $ 时自动包 $$...$$
    text = text.replace(/^([^\n$]*\\[a-zA-Z]+[^\n$]*)$/gm, function(line) {
        return line.indexOf('$') >= 0 ? line : '$$' + line + '$$';
    });
    return text;
}

async function renderMarkdown(el, text) {
    if (text && typeof marked !== 'undefined') {
        var processed = autoWrapMath(text);
        try {
            el.innerHTML = marked.parse(processed, { async: false });
        } catch(e) {
            try { el.innerHTML = await marked.parse(processed); } catch(e2) { el.textContent = text; }
        }
        if (typeof renderMathInElement !== 'undefined') {
            try { renderMathInElement(el, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError: false
            }); } catch(e) {}
        }
    } else {
        el.textContent = text || '';
    }
}

function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===================== Tools =====================
async function loadTools() {
    const el = document.getElementById('toolsContent');
    try {
        const resp = await fetch('/api/tools');
        const data = await resp.json();
        if (!data.groups || data.groups.length === 0) {
            el.innerHTML = '<div class="empty-state"><i class="bi bi-puzzle"></i><p>无已注册工具</p></div>';
            return;
        }
        el.innerHTML = data.groups.map(g => `
            <div style="margin-bottom:20px">
                <h6 style="color:var(--accent);text-transform:uppercase;font-size:0.8rem;letter-spacing:0.5px">${escapeHtml(g.name)} <span class="badge bg-secondary ms-1">${escapeHtml(g.scope)}</span></h6>
                <div class="d-flex flex-wrap gap-3">
                    ${(g.tools||[]).map(t => `
                        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;width:240px">
                            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><i class="bi bi-cpu" style="color:var(--accent)"></i><strong>${escapeHtml(t.name)}</strong></div>
                            <p style="font-size:0.8rem;color:var(--text-muted);margin:0">${escapeHtml(t.description||'')}</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    } catch(e) {
        el.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>加载失败</p></div>';
    }
}

// ===================== Settings =====================
let settingsCache = {};

async function loadSettings() {
    try {
        const r = await fetch('/api/settings');
        settingsCache = await r.json();
        updateContextBar();
        renderSettings();
    } catch(e) {
        document.getElementById('settingsContent').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>加载失败</p></div>';
    }
}

function updateContextBar() {
    const max = settingsCache.maxInputTokens || 128000;
    const used = settingsCache.usedTokens || 0;
    const remaining = Math.max(0, max - used);
    const pct = max > 0 ? (remaining / max) * 100 : 100;
    document.getElementById('ctxBar').style.width = pct + '%';
    document.getElementById('ctxLabel').textContent = '≈' + (used/1000).toFixed(0) + 'K / ' + (max/1000).toFixed(0) + 'K tokens';
    document.getElementById('sessIdBadge').textContent = sessionId ? sessionId.slice(0, 8) + '...' : '—';
}

function renderSettings() {
    const s = settingsCache;
    const el = document.getElementById('settingsContent');
    el.innerHTML = `<div style="max-width:600px">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px">
            <h6 style="margin:0 0 16px;font-weight:600">模型配置</h6>
            <div style="margin-bottom:12px">
                <label style="font-size:0.85rem;color:var(--text-muted);display:block;margin-bottom:4px">提供商</label>
                <select id="setProvider" style="width:100%;padding:8px 12px;background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:0.9rem">
                    <option value="deepseek" ${s.provider==='deepseek'?'selected':''}>DeepSeek</option>
                    <option value="openai" ${s.provider==='openai'?'selected':''}>OpenAI</option>
                    <option value="dashscope" ${s.provider==='dashscope'?'selected':''}>DashScope (阿里)</option>
                </select>
            </div>
            <div style="margin-bottom:12px">
                <label style="font-size:0.85rem;color:var(--text-muted);display:block;margin-bottom:4px">模型名称</label>
                <input id="setModel" value="${escapeHtml(s.model||'')}" placeholder="deepseek-chat" style="width:100%;padding:8px 12px;background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:0.9rem">
            </div>
            <div style="margin-bottom:12px">
                <label style="font-size:0.85rem;color:var(--text-muted);display:block;margin-bottom:4px">API Key</label>
                <input id="setApiKey" type="password" placeholder="sk-..." style="width:100%;padding:8px 12px;background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:0.9rem">
                <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">当前: ${escapeHtml(s.apiKey||'(未设置)')}</div>
            </div>
            <div style="margin-bottom:16px">
                <label style="font-size:0.85rem;color:var(--text-muted);display:block;margin-bottom:4px">自定义 Base URL（可选）</label>
                <input id="setBaseUrl" placeholder="默认" style="width:100%;padding:8px 12px;background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:0.9rem">
            </div>
            <button onclick="saveSettings()" style="width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:0.9rem;font-weight:600;cursor:pointer">保存并切换（即时生效）</button>
            <div id="saveMsg" style="margin-top:8px;font-size:0.8rem"></div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px">
            <h6 style="margin:0 0 12px;font-weight:600">当前状态</h6>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.85rem">
                <div style="color:var(--text-muted)">提供商</div><div>${escapeHtml(s.provider)}</div>
                <div style="color:var(--text-muted)">模型</div><div>${escapeHtml(s.model)}</div>
                <div style="color:var(--text-muted)">API Key</div><div>${escapeHtml(s.apiKey)}</div>
                <div style="color:var(--text-muted)">最大输入</div><div>${(s.maxInputTokens/1000).toFixed(0)}K tokens</div>
                <div style="color:var(--text-muted)">流式输出</div><div>${s.supportsStreaming?'<span style="color:#22c55e">支持</span>':'<span style="color:#ef4444">不支持</span>'}</div>
                <div style="color:var(--text-muted)">工具调用</div><div>${s.supportsToolCalling?'<span style="color:#22c55e">支持</span>':'<span style="color:#ef4444">不支持</span>'}</div>
            </div>
        </div>

async function saveSettings() {
    const body = {
        provider: document.getElementById('setProvider').value,
        model: document.getElementById('setModel').value,
        apiKey: document.getElementById('setApiKey').value,
        baseUrl: document.getElementById('setBaseUrl').value
    };
    try {
        const r = await fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        const data = await r.json();
        document.getElementById('saveMsg').innerHTML = data.ok
            ? '<span style="color:#22c55e">✓ ' + data.message + '</span>'
            : '<span style="color:#ef4444">✗ 保存失败</span>';
        loadSettings();
    } catch(e) {
        document.getElementById('saveMsg').innerHTML = '<span style="color:#ef4444">✗ ' + e.message + '</span>';
    }
}

// ===================== Hooks =====================
async function loadHooks() {
    const el = document.getElementById('hooksContent');
    try {
        const resp = await fetch('/api/hooks');
        const data = await resp.json();
        const hooks = data.hooks || [];
        if (hooks.length === 0) {
            el.innerHTML = '<div class="empty-state"><i class="bi bi-link-45deg"></i><p>无活跃 Hook</p></div>';
            return;
        }
        el.innerHTML = `<div style="font-size:1.4rem;font-weight:700;margin-bottom:16px" class="text-gradient">${hooks.length} 活跃 Hook</div>`
            + hooks.map(h => `
                <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:10px">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><i class="bi bi-link" style="color:var(--accent)"></i><strong>${escapeHtml(h.name)}</strong><span class="badge bg-secondary">优先级 ${h.priority}</span></div>
                    <p style="font-size:0.85rem;color:var(--text-muted);margin:0 0 6px">${escapeHtml(h.description||'')}</p>
                    <div>${(h.events||[]).map(e => `<span class="badge bg-dark me-1" style="font-size:0.65rem">${escapeHtml(e)}</span>`).join('')}</div>
                </div>

    } catch(e) {
        el.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>加载失败</p></div>';
    }
}

async function countHistoryTokens(bubbleId, text) {
    try {
        const r = await fetch('/api/token/count', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text})
        });
        const data = await r.json();
        document.getElementById('tokenBadge-' + bubbleId).textContent =
            '↓' + data.tokens + ' tokens';
    } catch(e) {}
}

// ===================== Init =====================
async function loadHistory() {
    const sid = sessionStorage.getItem('chatSessionId');
    if (!sid) return;
    try {
        const resp = await fetch('/api/agent/session/' + sid + '/history');
        if (!resp.ok) return;
        const messages = await resp.json();
        if (!messages || messages.length === 0) return;

        if (emptyState) { emptyState.remove(); emptyState = null; }
        messages.forEach(msg => {
            const role = (msg.role || '').toLowerCase();
            if (role === 'user') {
                const text = (msg.contentBlocks || [])
                    .filter(b => b.type === 'text').map(b => b.text).join('');
                if (text) addUserBubble(text);
            } else if (role === 'assistant') {
                const text = (msg.contentBlocks || [])
                    .filter(b => b.type === 'text').map(b => b.text).join('');
                const thinking = (msg.contentBlocks || [])
                    .filter(b => b.type === 'thinking').map(b => b.text).join('');
                const tools = (msg.contentBlocks || [])
                    .filter(b => b.type === 'tool_use').map(b => ({ name: b.name, args: b.arguments || '' }));
                if (text || thinking || tools.length > 0) {
                    const bid = addAssistantBubble(text, thinking, tools);
                    if (text) countHistoryTokens(bid, text);
                }
            }
        });
        scrollChat();
    } catch(e) {
        // history unavailable — start fresh
    }
}

loadHistory();
loadTools();
loadHooks();
loadSettings();

// ===================== 审批轮询 =====================
async function pollApprovals() {
    try {
        const r = await fetch('/api/interventions/pending/' + sessionId);
        const interventions = await r.json();
        if (!interventions || interventions.length === 0) return;

        // 移除旧的审批卡片
        document.querySelectorAll('.approval-card').forEach(el => el.remove());

        interventions.forEach(a => {
            const pending = a.status === 'PENDING';
            const approved = a.status === 'APPROVED';
            const denied = a.status === 'DENIED';
            const bg = pending ? 'rgba(245,158,11,0.06)' : approved ? 'rgba(34,197,94,0.06)' : 'rgba(239,68,68,0.06)';
            const bd = pending ? 'rgba(245,158,11,0.2)' : approved ? 'rgba(34,197,94,0.2)' : 'rgba(239,68,68,0.2)';
            const ac = pending ? '#f59e0b' : approved ? '#22c55e' : '#ef4444';
            const card = document.createElement('div');
            card.className = 'approval-card';
            card.style.cssText = `align-self:flex-start;max-width:80%;margin:4px 0;padding:12px 16px;background:${bg};border:1px solid ${bd};border-radius:var(--radius);font-size:0.85rem`;
            card.innerHTML = `
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
                    <span style="background:${ac}22;color:${ac};font-size:0.65rem;padding:1px 6px;border-radius:3px;font-weight:600">${esc(a.riskLevel||'MEDIUM')}</span>
                    <strong>${esc(a.toolName)}</strong>
                    <span style="font-size:0.75rem;color:${ac}">${pending ? '⏳ 等待审批' : approved ? '✓ 已批准' : '✗ 已拒绝'}</span>
                </div>
                <div style="margin-bottom:4px">${esc(a.question||'')}</div>
                ${a.toolArgs ? '<div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:6px">' + Object.entries(a.toolArgs).map(([k,v]) => '<code>'+esc(k)+'</code>: '+esc(String(v))).join('&nbsp;|&nbsp;') + '</div>' : ''}
                ${pending
                    ? '<a href="/approvals.html" target="_blank" style="font-size:0.75rem;color:var(--accent);text-decoration:none">📋 打开审批页面（需审批人操作）</a>'
                    : '<div style="font-size:0.7rem;color:var(--text-muted)">'+esc(a.resolverId||'')+(a.resolution?' | '+esc(a.resolution):'')+'</div>'}
            `;
            chatMessages.appendChild(card);
        });
        scrollChat();
    } catch(_) {}
}

// 每次发送消息后更新上下文用量（按字符数估算）
function updateContextUsage() {
    const max = settingsCache.maxInputTokens || 128000;
    let totalChars = 0;
    for (const el of chatMessages.querySelectorAll('.chat-bubble')) {
        totalChars += (el.textContent || '').length;
    }
    // 粗略估算：中文约1.5 chars/token，英文约4 chars/token
    settingsCache.usedTokens = Math.ceil(totalChars / 2.5);
    updateContextBar();
}
