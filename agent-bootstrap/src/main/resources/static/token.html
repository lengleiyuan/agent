<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token 计数 — HarnessAgent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px}
h1{font-size:20px;color:#58a6ff}
nav{display:flex;gap:8px;margin-top:12px}
nav a{color:#8b949e;text-decoration:none;padding:6px 12px;border-radius:6px;font-size:14px}
nav a:hover,nav a.active{background:#21262d;color:#c9d1d9}
main{max-width:900px;margin:0 auto;padding:24px}
h2{font-size:16px;color:#e6edf3;margin-bottom:12px}
textarea{width:100%;min-height:160px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:12px;font-family:monospace;font-size:14px;resize:vertical}
.actions{display:flex;gap:8px;margin-top:12px;align-items:center}
button{background:#238636;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px}
button:hover{background:#2ea043}
button.secondary{background:#21262d;color:#c9d1d9}
button.secondary:hover{background:#30363d}
.result{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-top:16px;display:none}
.result.visible{display:block}
.result .tokens{font-size:48px;font-weight:700;color:#3fb950}
.result .row{display:flex;gap:32px;margin-top:12px;flex-wrap:wrap}
.result .item{min-width:100px}
.result .item .label{font-size:12px;color:#8b949e;text-transform:uppercase;margin-bottom:4px}
.result .item .val{font-size:20px;font-weight:600;color:#e6edf3}
.result .item .unit{font-size:13px;color:#8b949e;margin-left:4px}
.info{font-size:13px;color:#8b949e;margin-top:8px;line-height:1.6}
.info code{background:#21262d;padding:2px 6px;border-radius:4px;font-size:12px;color:#d2a8ff}
</style>
</head>
<body>
<header>
  <h1>Token 精确计数</h1>
  <nav>
    <a href="dashboard.html">仪表盘</a>
    <a href="token.html" class="active">Token 计数</a>
    <a href="/api/tools" target="_blank">工具列表</a>
    <a href="/actuator/prometheus" target="_blank">Prometheus</a>
  </nav>
</header>

<main>
  <h2>输入文本（cl100k_base 编码，对齐 OpenAI tiktoken）</h2>
  <textarea id="input" placeholder="输入要计数的文本..."></textarea>
  <div class="actions">
    <button onclick="countTokens()">计数 Token</button>
    <button class="secondary" onclick="loadSamples()">加载示例</button>
  </div>

  <div class="result" id="result">
    <div class="tokens" id="tokenCount">0</div>
    <div class="row">
      <div class="item">
        <div class="label">字符数</div>
        <div class="val" id="charCount">0</div>
      </div>
      <div class="item">
        <div class="label">Token/字符</div>
        <div class="val" id="ratio">0</div>
      </div>
      <div class="item">
        <div class="label">编码器</div>
        <div class="val" style="font-size:14px">cl100k_base</div>
      </div>
    </div>
  </div>

  <div class="info" style="margin-top:24px">
    <p>使用 <code>cl100k_base</code> 编码器，对齐 OpenAI GPT-4/GPT-4o/GPT-3.5-turbo 的官方 Token 计数。</p>
    <p style="margin-top:8px">API 端点: <code>POST /api/token/count</code> — Body: <code>{"text": "..."}</code></p>
  </div>
</main>

<script>
const samples = [
  'Hello, how are you today?',
  '请用中文回复：今天天气怎么样？',
  'def fibonacci(n):\n    if n <= 1:\n        return n\n    return fibonacci(n-1) + fibonacci(n-2)',
  'The quick brown fox jumps over the lazy dog. ' + 'Pack my box with five dozen liquor jugs.',
  '{"name": "calculator", "parameters": {"expression": "2 + 2 * 3"}}',
  '你将作为一个专业的AI助手，帮助用户完成各种复杂的编程任务。请仔细分析问题，逐步思考，然后给出清晰的解决方案。'
];

async function countTokens() {
  const text = document.getElementById('input').value;
  if (!text.trim()) return;

  try {
    const resp = await fetch('/api/token/count', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: text})
    });
    const data = await resp.json();
    document.getElementById('result').classList.add('visible');
    document.getElementById('tokenCount').textContent = data.tokens;
    document.getElementById('charCount').textContent = data.characters;
    document.getElementById('ratio').textContent = data.characters > 0
      ? (data.tokens / data.characters).toFixed(2) : '0';
  } catch(e) {
    console.error('Token count failed:', e);
  }
}

function loadSamples() {
  const idx = Math.floor(Math.random() * samples.length);
  document.getElementById('input').value = samples[idx];
  countTokens();
}

// 实时计数（防抖）
let timer;
document.getElementById('input').addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(countTokens, 300);
});
</script>
</body>
</html>
